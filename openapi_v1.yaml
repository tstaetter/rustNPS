openapi: 3.1.1
info:
  title: rustNPS API v1
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
  description: API v1 specification for the rustNPS application.
  contact:
    name: Unartig Team

servers:
  - url: /v1
    description: local

security:
  - bearerAuth: [ ]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateNpsPayload:
      type: object
      required:
        - user
        - segment
        - score
      properties:
        user:
          type: string
          format: ObjectId
        segment:
          type: string
          enum:
            - User
            - Studio
            - Professional
        score:
          type: integer
          format: int32
          minimum: 0
          maximum: 10
        comment:
          type: string

    DismissNpsPayload:
      type: object
      required:
        - user
        - segment
        - dismissed
      properties:
        user:
          type: string
          format: ObjectId
        segment:
          type: string
          enum:
            - User
            - Studio
            - Professional
        dismissed:
          type: boolean

    NpsDashboardResponse:
      type: object
      properties:
        period_days:
          type: integer
        overall:
          $ref: '#/components/schemas/NpsStats'
        segments:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NpsStats'
        trend:
          type: array
          items:
            $ref: '#/components/schemas/TrendItem'

    NpsStats:
      type: object
      properties:
        total:
          type: integer
        promoters:
          type: integer
        passives:
          type: integer
        detractors:
          type: integer
        nps:
          type: integer
        promoter_pct:
          type: number
        passive_pct:
          type: number
        detractor_pct:
          type: number
        average:
          type: number

    TrendItem:
      type: object
      properties:
        label:
          type: string
        overall:
          type: integer
        by_segment:
          type: object
          additionalProperties:
            type: integer
        total:
          type: integer

    Success:
      type: object
      properties:
        message:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /nps:
    get:
      tags:
        - NPS
      summary: Get NPS dashboard with statistics
      description: >-
        Returns NPS dashboard with overall and per-segment statistics and trend data.
        Entries where dismissed is true are excluded from statistics.
      operationId: getNpsDashboard
      parameters:
        - name: period
          in: query
          description: 'Number of days to look back (default: 90)'
          schema:
            type: integer
            default: 90
            minimum: 1
            maximum: 730
      responses:
        '200':
          description: Dashboard with stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpsDashboardResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - NPS
      summary: Create a new NPS entry
      operationId: createNpsEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNpsPayload'
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /nps/dismiss:
    delete:
      tags:
        - NPS
      summary: Update an existing NPS entry's dismissed status
      description: >-
        Sets the dismissed flag on an existing NPS entry identified by user and segment.
        Does not create a new entry; returns 404 if no matching entry exists.
      operationId: dismissNpsEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DismissNpsPayload'
      responses:
        '200':
          description: Entry dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found - no matching entry for the given user and segment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
